version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: gphub_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aidigest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aidigest_secret}
      POSTGRES_DB: ${POSTGRES_DB:-aidigest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aidigest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gphub_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gphub_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aidigest}:${POSTGRES_PASSWORD:-aidigest_secret}@db:5432/${POSTGRES_DB:-aidigest}
      REDIS_URL: redis://redis:6379/0
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CRAWL4AI_VERBOSE: "false"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gphub_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
